name: Update Recent Public Repos

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Update README recent repos
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const { data: repos } = await github.rest.repos.listForUser({
              username: owner,
              sort: 'updated',
              direction: 'desc',
              per_page: 8,
              type: 'owner'
            });

            const recent = repos
              .filter((item) => !item.fork && !item.private)
              .slice(0, 4);

            const cards = recent.map((item) => [
              `<a href="${item.html_url}">`,
              `  <img src="https://github-readme-stats.vercel.app/api/pin/?username=${owner}&repo=${encodeURIComponent(item.name)}&theme=transparent&hide_border=true&title_color=38BDF8&text_color=94A3B8&icon_color=6366F1" alt="${item.name} repository card" />`,
              `</a>`
            ].join('\n')).join('\n');

            const block = [
              '<!-- RECENT-REPOS:START -->',
              '<div align="center">',
              '',
              cards || 'No public repositories found yet.',
              '',
              '<br />',
              '',
              '<a href="https://github.com/' + owner + '?tab=repositories&type=source&sort=updated">',
              '  <img src="https://img.shields.io/badge/View%20all%20public%20repos-0ea5e9?style=for-the-badge&logo=github&logoColor=white" alt="View all public repositories" />',
              '</a>',
              '',
              '</div>',
              '<!-- RECENT-REPOS:END -->'
            ].join('\n');

            const { data: readme } = await github.rest.repos.getContent({
              owner,
              repo,
              path: 'README.md'
            });

            const content = Buffer.from(readme.content, 'base64').toString('utf8');
            const next = content.replace(
              /<!-- RECENT-REPOS:START -->[\s\S]*<!-- RECENT-REPOS:END -->/,
              block
            );

            if (next === content) {
              core.info('README is already up to date.');
              return;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path: 'README.md',
              message: 'Update recent public repos',
              content: Buffer.from(next, 'utf8').toString('base64'),
              sha: readme.sha
            });
